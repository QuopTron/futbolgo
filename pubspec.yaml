name: futbolgo
description: FutbolGO - Ver partidos y streams deportivos en vivo con AD-Blocker potente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLoC pattern for state management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # WebView para reproducir streams embed (Android, iOS, Windows, macOS)
  flutter_inappwebview: ^6.1.0

  # HTTP para conectar con backend
  http: ^1.1.0

  # Storage local
  shared_preferences: ^2.2.0

  # Abrir URLs en navegador (Windows/Desktop)
  url_launcher: ^6.2.0

  # Media Kit - Reproductor nativo HLS/MP4/RTMP (Android + Windows)
  media_kit: ^1.1.9
  media_kit_video: ^1.2.4
  media_kit_native_event_loop: ^1.0.9

  # Bundles libmpv para cada plataforma
  media_kit_libs_windows_video: ^1.0.4
  media_kit_libs_android_video: ^1.3.5

  # Animations
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
